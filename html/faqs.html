    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
            padding: 16px;
        }
        h1 {
            font-size: 22px;
            color: #1a237e;
            text-align: center;
            margin-bottom: 20px;
            padding: 16px 0;
        }
        .category {
            margin-bottom: 16px;
        }
        .category-title {
            background: #1a237e;
            color: #fff;
            padding: 14px 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .category-title::after {
            content: '\25BC';
            font-size: 12px;
            transition: transform 0.3s;
        }
        .category-title.active::after {
            transform: rotate(180deg);
        }
        .category-content {
            display: none;
            background: #fff;
            border-radius: 0 0 8px 8px;
            overflow: hidden;
        }
        .category-content.show { display: block; }
        .question {
            border-bottom: 1px solid #eee;
        }
        .question-title {
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
            color: #1a237e;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9ff;
        }
        .question-title::after {
            content: '+';
            font-size: 18px;
            font-weight: bold;
            color: #1a237e;
            min-width: 20px;
            text-align: center;
        }
        .question-title.active::after { content: '\2212'; }
        .question-body {
            display: none;
            padding: 12px 16px;
        }
        .question-body.show { display: block; }
        .question-desc {
            font-size: 13px;
            color: #555;
            margin-bottom: 12px;
        }
        .note {
            background: #fff3e0;
            border-left: 3px solid #ff9800;
            padding: 10px 12px;
            margin: 10px 0;
            font-size: 12px;
            color: #e65100;
            border-radius: 0 4px 4px 0;
        }
        .step {
            margin-bottom: 16px;
            padding-left: 8px;
        }
        .step-header {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 8px;
        }
        .step-number {
            background: #1a237e;
            color: #fff;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .step-text {
            font-size: 13px;
            color: #333;
            white-space: pre-line;
        }
        .step-image {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 8px;
            border: 1px solid #e0e0e0;
        }
        .sub-items {
            padding-left: 16px;
            margin-top: 8px;
        }
        .sub-item {
            font-size: 12px;
            color: #555;
            padding: 3px 0;
            display: flex;
            gap: 6px;
        }
        .sub-item-bullet {
            color: #1a237e;
            font-weight: bold;
        }
        .sub-section-title {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin: 8px 0 4px;
        }
    </style>
</head>

    function renderSubItems(ds3Items) {
        if (!ds3Items || ds3Items.length === 0) return '';
        let html = '<div class="sub-items">';
        ds3Items.forEach(ds3 => {
            html += `<div class="sub-section-title">${ds3.ds3_title}</div>`;
            if (ds3.ds_4 && ds3.ds_4.length > 0) {
                ds3.ds_4.forEach(ds4 => {
                    html += `<div class="sub-item"><span class="sub-item-bullet">&bull;</span> ${ds4.ds4_title}</div>`;
                    if (ds4.ds_5 && ds4.ds_5.length > 0) {
                        html += '<div style="padding-left:16px">';
                        ds4.ds_5.forEach(ds5 => {
                            html += `<div class="sub-item"><span class="sub-item-bullet">-</span> ${ds5.ds5_title}</div>`;
                        });
                        html += '</div>';
                    }
                });
            }
        });
        html += '</div>';
        return html;
    }

    function renderFAQ(data) {
        const container = document.getElementById('faq-container');
        data.forEach((category, catIdx) => {
            let catHtml = `<div class="category">`;
            catHtml += `<div class="category-title" onclick="toggleCategory(this)">${category.title}</div>`;
            catHtml += `<div class="category-content">`;

            category.ds_1.forEach((q) => {
                catHtml += `<div class="question">`;
                catHtml += `<div class="question-title" onclick="toggleQuestion(this)">${q.title}</div>`;
                catHtml += `<div class="question-body">`;
                if (q.desc) catHtml += `<div class="question-desc">${q.desc}</div>`;
                if (q.note1) catHtml += `<div class="note"><strong>Note:</strong> ${q.note1}</div>`;
                if (q.note2) catHtml += `<div class="note">${q.note2}</div>`;

                q.ds_2.forEach((step, stepIdx) => {
                    catHtml += `<div class="step">`;
                    catHtml += `<div class="step-header">`;
                    catHtml += `<div class="step-number">${stepIdx + 1}</div>`;
                    catHtml += `<div class="step-text">${step.ds2_title}</div>`;
                    catHtml += `</div>`;
                    if (step.imagePath) catHtml += `<img class="step-image" src="../${step.imagePath}" alt="${step.ds2_title}" loading="lazy">`;
                    if (step.ds_3) catHtml += renderSubItems(step.ds_3);
                    catHtml += `</div>`;
                });

                catHtml += `</div></div>`;
            });

            catHtml += `</div></div>`;
            container.innerHTML += catHtml;
        });
    }

    function toggleCategory(el) {
        el.classList.toggle('active');
        el.nextElementSibling.classList.toggle('show');
    }

    function toggleQuestion(el) {
        el.classList.toggle('active');
        el.nextElementSibling.classList.toggle('show');
    }

    renderFAQ(faqData);
    </script>
